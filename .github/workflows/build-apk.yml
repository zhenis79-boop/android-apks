name: Build and Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Скачать код репозитория
        uses: actions/checkout@v4

      - name: Установить Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Установить Android SDK
        uses: android-actions/setup-android@v3

      - name: Восстановить release keystore
        run: |
          mkdir -p "$RUNNER_TEMP/keystore"
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/keystore/release.keystore"

      - name: Собрать подписанный release APK
        working-directory: WAVoiceReader
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/keystore/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          gradle assembleRelease --stacktrace \
            -PappVersionCode=${{ github.run_number }} \
            -PappVersionName=1.0.${{ github.run_number }}

      - name: Удалить keystore с раннера
        if: always()
        run: rm -rf "$RUNNER_TEMP/keystore"

      - name: Опубликовать в GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: WAVoiceReader v1.0.${{ github.run_number }}
          files: WAVoiceReader/app/build/outputs/apk/release/app-release.apk
