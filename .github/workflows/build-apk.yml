name: Build APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Скачать код репозитория
        uses: actions/checkout@v4

      - name: Установить Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Установить Android SDK
        uses: android-actions/setup-android@v3

      - name: Собрать APK (debug)
        working-directory: WAVoiceReader
        run: gradle assembleDebug --stacktrace

      - name: Загрузить готовый APK как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: WAVoiceReader-apk
          path: WAVoiceReader/app/build/outputs/apk/debug/app-debug.apk
